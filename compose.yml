# Local development infrastructure for swim-ed254-provider-validator.
#
# Starts:
#   - ed254-provider-validator-mariadb : validator persistence
#
# This validator connects to a running swim-ed254-provider instance (external).
# Configure SWIM_PROVIDER_API_URLS, SWIM_PROVIDER_AMQP_HOST, and KEYCLOAK_URL
# to point at your provider before running.
#
# Usage:
#   podman compose up -d
#   ./mvnw quarkus:dev   (starts validator on port 8080)

services:

  ed254-provider-validator-mariadb:
    image: docker.io/library/mariadb:12-ubi
    container_name: ed254-provider-validator-mariadb
    ports:
      - "3310:3306"
    environment:
      MARIADB_DATABASE: swim_ed254_provider_validator
      MARIADB_USER: swim
      MARIADB_PASSWORD: swim
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ed254-provider-validator-mariadb-data:/var/lib/mysql
    networks:
      - swim-network
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ed254-provider-validator-mariadb-data:

networks:
  swim-network:
    name: swim-ed254-provider-validator-network
    driver: bridge
